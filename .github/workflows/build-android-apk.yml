name: Build Android APK (HODIX)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - preview
          - development

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive

      - name: Get APK URL
        run: |
          echo "✅ Build terminé ! Va sur https://expo.dev pour télécharger l'APK HODIX."
