name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: Type-check & smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Smoke tests
        run: npm run test:smoke
